version: "3.9"

services:
  # ── API Service ─────────────────────────────────────────────────────────────
  api:
    build: .
    image: pdf-translator:latest
    container_name: pdf_translator_api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      FLASK_ENV: production
      PORT: 5000
      REDIS_URL: redis://redis:6379/0
      # LLM API Keys — set in .env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
      GROK_API_KEY:      ${GROK_API_KEY:-}
      GROQ_API_KEY:      ${GROQ_API_KEY:-}
      MISTRAL_API_KEY:   ${MISTRAL_API_KEY:-}
      COHERE_API_KEY:    ${COHERE_API_KEY:-}
      OLLAMA_BASE_URL:   ${OLLAMA_BASE_URL:-http://ollama:11434}
      # Service config
      DEFAULT_PROVIDER:    ${DEFAULT_PROVIDER:-openai}
      MAX_WORKERS:         ${MAX_WORKERS:-6}
      CHUNK_SIZE:          ${CHUNK_SIZE:-20}
      MAX_UPLOAD_MB:       ${MAX_UPLOAD_MB:-100}
      JOB_TTL_HOURS:       ${JOB_TTL_HOURS:-4}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-20}
      RATELIMIT_ENABLED:   ${RATELIMIT_ENABLED:-true}
      RATELIMIT_TRANSLATE: ${RATELIMIT_TRANSLATE:-20/hour}
      LOG_LEVEL:           ${LOG_LEVEL:-INFO}
      GUNICORN_WORKERS:    ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS:    ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT:    ${GUNICORN_TIMEOUT:-600}
      CORS_ORIGINS:        ${CORS_ORIGINS:-*}
    volumes:
      - uploads_vol:/app/uploads
      - outputs_vol:/app/outputs
      - logs_vol:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pdf_translator_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_vol:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    build: .
    image: pdf-translator:latest
    container_name: pdf_translator_worker
    restart: unless-stopped
    command: celery -A app.core.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      FLASK_ENV: production
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
      GROK_API_KEY:      ${GROK_API_KEY:-}
      GROQ_API_KEY:      ${GROQ_API_KEY:-}
      MISTRAL_API_KEY:   ${MISTRAL_API_KEY:-}
      COHERE_API_KEY:    ${COHERE_API_KEY:-}
      OLLAMA_BASE_URL:   ${OLLAMA_BASE_URL:-http://ollama:11434}
      DEFAULT_PROVIDER:  ${DEFAULT_PROVIDER:-openai}
      MAX_WORKERS:       ${MAX_WORKERS:-6}
      CHUNK_SIZE:        ${CHUNK_SIZE:-20}
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
    volumes:
      - uploads_vol:/app/uploads
      - outputs_vol:/app/outputs
      - logs_vol:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pdf_translator_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro       # mount your TLS certs here
    depends_on:
      - api
    profiles:
      - nginx   # enable with: docker compose --profile nginx up

volumes:
  uploads_vol:
  outputs_vol:
  logs_vol:
  redis_vol:
